upstream api {
  server api:8080;
}

upstream console {
  server console:80;
}  

upstream expert {
  server expert:8082;
}  

upstream mail {
  server mail:8080;
}  


server {
  listen 80;

  location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
  #underscores_in_headers on;
  return 301 https://$host$request_uri;

  }

server {
    listen 443 ssl;
    listen [::]:443 ssl ;
    client_max_body_size 30M;

    #server_name app.ecscompliance.com;
   
    access_log /dev/stdout ;
    error_log /dev/stderr debug ;


    error_page 405 =200 $uri;


    #server_tokens off;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;


    #ssl_certificate /etc/nginx/ssl/live/app.ecscompliance.com/fullchain.pem;
    #ssl_certificate_key /etc/nginx/ssl/live/app.ecscompliance.com/privkey.pem;


    #ssl_buffer_size 8k;

    #ssl_dhparam /etc/ssl/certs/dhparam-2048.pem;

    #ssl_protocols TLSv1.2 TLSv1.1 TLSv1;
    #ssl_prefer_server_ciphers on;

    #ssl_ciphers ECDH+AESGCM:ECDH+AES256:ECDH+AES128:DH+3DES:!ADH:!AECDH:!MD5;

    #ssl_ecdh_curve secp384r1;
    #ssl_session_tickets off;

    # OCSP stapling
    #ssl_stapling on;
    #ssl_stapling_verify on;
    #resolver 8.8.8.8;


    # Define the specified charset to the “Content-Type” response header field
    #charset utf-8;


  location /api {
    rewrite /api/(.*) /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass_request_headers      on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_pass http://api;
  }

  location /mail {
    rewrite /mail/(.*) /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass_request_headers      on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_pass http://mail;
  }

  location /expert {
    rewrite /expert/(.*) /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass_request_headers      on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_pass http://expert;
  }


  location / {
    #rewrite /console/(/.*|$) /$1 break; 
    expires -1;
    add_header Cache-Control no-store;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_pass_request_headers      on;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_pass http://console;
  }

}


