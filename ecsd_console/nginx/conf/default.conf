server {
  listen 80;
  client_max_body_size 30M;

  resolver 169.254.169.254 valid=300s ipv6=off;

  set $api_proxy_url "{API_PROXY_URL}";
  set $expert_proxy_url "{EXPERT_PROXY_URL}";
  set $mail_proxy_url "{MAIL_PROXY_URL}";

  location /api {
    rewrite ^/api/?(.*)$ /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass $api_proxy_url;
  }

  location /expert {
    rewrite ^/expert/?(.*)$ /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_pass $expert_proxy_url;
  }

  location /mail {
    rewrite ^/mail/?(.*)$ /$1 break;
    expires -1;
    add_header Cache-Control no-store;
    proxy_http_version 1.1;
    proxy_set_header Host $proxy_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
    proxy_pass $mail_proxy_url;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
